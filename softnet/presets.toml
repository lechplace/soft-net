# soft-net — MLP preset architectures
#
# Format każdego presetu:
#   [nazwa]
#   layers      = [int, ...]   # liczba neuronów w kolejnych warstwach ukrytych
#   dropout     = float        # dropout po każdej warstwie ukrytej (0.0 = brak)
#   batch_norm  = bool         # BatchNormalization po każdej warstwie
#   description = "..."        # opis dla list_presets()
#
# Możesz tu dodawać własne presety lub zmieniać istniejące.
# Plik jest ładowany przy imporcie softnet.presets — zmiany są widoczne po restarcie.

# ── 2 warstwy ────────────────────────────────────────────────────────────────

[tiny]
layers      = [64, 32]
dropout     = 0.0
batch_norm  = false
description = "2 warstwy, brak regularyzacji. Dobry punkt startowy dla małych zbiorów."

# ── 3 warstwy ────────────────────────────────────────────────────────────────

[small]
layers      = [128, 64, 32]
dropout     = 0.1
batch_norm  = false
description = "3 warstwy, lekki dropout. Polecany dla prostych zadań (Iris, tabular < 1k)."

[small_bn]
layers      = [128, 64, 32]
dropout     = 0.2
batch_norm  = true
description = "3 warstwy + BatchNorm. Szybsza zbieżność niż 'small'."

# ── 4 warstwy ────────────────────────────────────────────────────────────────

[medium]
layers      = [256, 128, 64, 32]
dropout     = 0.2
batch_norm  = false
description = "4 warstwy, umiarkowany dropout. Dobry kompromis ogólne zastosowania."

[medium_bn]
layers      = [256, 128, 64, 32]
dropout     = 0.3
batch_norm  = true
description = "4 warstwy + BatchNorm + silniejszy dropout. Odporny na overfitting."

# ── 5 warstwy ────────────────────────────────────────────────────────────────

[large]
layers      = [512, 256, 128, 64, 32]
dropout     = 0.3
batch_norm  = false
description = "5 warstw, dobry dla średnich zbiorów (10k–100k próbek)."

[large_bn]
layers      = [512, 256, 128, 64, 32]
dropout     = 0.3
batch_norm  = true
description = "5 warstw + BatchNorm. Zalecany gdy dane nie są znormalizowane."

# ── 6 warstw ─────────────────────────────────────────────────────────────────

[deep]
layers      = [512, 256, 256, 128, 64, 32]
dropout     = 0.3
batch_norm  = true
description = "6 warstw, silna regularyzacja. Dla złożonych zadań (fraud detection, >100k)."

[deep_wide]
layers      = [1024, 512, 256, 128, 64, 32]
dropout     = 0.4
batch_norm  = true
description = "6 szerokich warstw. Maksymalna pojemność — wymaga dużo danych."

# ── specjalne ─────────────────────────────────────────────────────────────────

[wide]
layers      = [1024, 512, 256]
dropout     = 0.4
batch_norm  = true
description = "3 szerokie warstwy. Dobre gdy features są bardzo informatywne."

[residual_like]
layers      = [256, 256, 256, 256]
dropout     = 0.2
batch_norm  = true
description = "4 równe warstwy, BatchNorm. Przypomina styl ResNet — stabilny trening."

# ── imbalanced / fraud detection ──────────────────────────────────────────────
# Źródła: keras.io/examples/structured_data/imbalanced_classification,
#         tensorflow.org/tutorials/structured_data/imbalanced_data,
#         MDPI Electronics 12(12):2674, Frontiers AI 2025/1643292

[imb_plateau_deep]
layers      = [256, 256, 256]
dropout     = 0.3
batch_norm  = false
description = "Canonical Keras/fchollet fraud pattern: 3x256 z Dropout 0.3. Plateau shape stabilizuje gradient dla danych niezbalansowanych."

[imb_plateau_bn]
layers      = [256, 256, 256, 128]
dropout     = 0.3
batch_norm  = true
description = "Plateau + BatchNorm + końcowe zwężenie. BN pomaga przy nienormalizowanych cechach transakcyjnych (Amount, Time)."

[imb_funnel_heavy]
layers      = [512, 256, 128, 64]
dropout     = 0.4
batch_norm  = true
description = "Zwężający funnel z mocnym Dropout 0.4. Dla bardzo silnej nierównowagi klas (>1:100), np. creditcard dataset (0.17% fraud)."

[imb_wide_dropout]
layers      = [512, 512, 256, 128]
dropout     = 0.35
batch_norm  = true
description = "Szeroka sieć plateau+zwężenie, Dropout 0.35. Dla dataset-ów z dużą liczbą cech PCA (V1-V28 w creditcard)."

[imb_deep_residual]
layers      = [256, 256, 256, 256, 128]
dropout     = 0.3
batch_norm  = true
description = "Głęboka sieć ResNet-style z końcowym zwężeniem. Stabilny gradient. Gdy class_weight lub SMOTE nie wystarczają."

[imb_lightweight]
layers      = [128, 128, 64]
dropout     = 0.3
batch_norm  = true
description = "Lekki model dla małych zbiorów niezbalansowanych (<50k próbek). Szybki przy oversamplingu SMOTE."

[imb_aggressive_reg]
layers      = [512, 256, 256, 128, 64, 32]
dropout     = 0.45
batch_norm  = true
description = "Maksymalna regularyzacja dla ekstremalnej nierównowagi (>1:500). Dropout 0.45 + BN + 6 warstw. Używać z class_weight lub focal loss."
